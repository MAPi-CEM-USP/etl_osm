<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Mapas</title>
    <style>
        /* Estilos básicos para deixar a página mais bonita */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .lista-mapas {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaço entre os botões */
            align-items: center;
        }
        .lista-mapas a {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 15px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .lista-mapas a:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Coleção de Mapas</h1>
    <p>Escolha um dos mapas abaixo para visualizar:</p>

    <div class="lista-mapas">
        
        <a href="mapas/features_map_amenities.html">Mapa Amenities - São Paulo</a>
        
        
        </div>

</body>
</html>
